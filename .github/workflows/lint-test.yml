---
name: Linting and Test

# Run for all pushes to main and pull requests when Go or YAML files change
on:
  push:
    paths:
      - go.mod
      - go.sum
      - '**.go'
      - '**.yaml'
    branches:
      - main
  pull_request:
    paths:
      - go.mod
      - go.sum
      - '**.go'
      - '**.yaml'

jobs:
  golangci:
    name: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run golangci-lint
        uses: metal-toolbox/ci-toolbox/actions/golangci-lint@v0.0.3

      # Don't include the models test that we tested above already. We don't want to calculate the test coverage from these into the app since we can't affect it
      - name: Run go tests and generate coverage report
        run: go test -race -coverprofile=coverage.txt -covermode=atomic -tags testtools -p 1 ./...


      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          flags: unittests
          name: codecov-umbrella
